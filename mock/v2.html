<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>knot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #111113;
  --text: #e8e8ec;
  --muted: #6e6e7a;
  --surface: #18181b;
  --card: #1c1c1f;
  --terminal: #0c0c0e;
  --accent: #8b7cf6;
  --running: #34d399;
  --needs-input: #f59e0b;
  --queued: #6e6e7a;
  --idle: #3f3f46;
  --error: #ef4444;
  --radius: 12px;
  --gap: 24px;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-weight: 300;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection {
  background: rgba(139, 124, 246, 0.25);
}

::-webkit-scrollbar {
  width: 4px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #2a2a2e;
  border-radius: 4px;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: var(--gap);
  gap: var(--gap);
}

/* ─── Top bar ─── */

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  padding: 0 4px;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 40px;
}

.logo {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  opacity: 0.5;
  user-select: none;
}

.workspaces {
  display: flex;
  align-items: center;
  gap: 28px;
}

.workspace-link {
  font-size: 14px;
  font-weight: 400;
  color: var(--muted);
  cursor: pointer;
  transition: color 0.2s, opacity 0.2s;
  user-select: none;
  letter-spacing: -0.01em;
}

.workspace-link:hover {
  color: var(--text);
  opacity: 0.8;
}

.workspace-link.active {
  color: var(--text);
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 20px;
}

.mode-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.02em;
}

.mode-toggles {
  display: flex;
  align-items: center;
  gap: 10px;
}

.mode-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #2a2a2e;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
}

.mode-dot:hover {
  background: #3a3a3e;
}

.mode-dot.active {
  background: var(--accent);
  box-shadow: 0 0 8px rgba(139, 124, 246, 0.3);
}

/* ─── Main content ─── */

.main {
  display: flex;
  flex: 1;
  gap: var(--gap);
  min-height: 0;
}

/* ─── Terminal area ─── */

.terminal-area {
  flex: 1;
  min-width: 0;
  display: flex;
  gap: var(--gap);
}

.terminal-panel {
  flex: 1;
  background: var(--terminal);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
  position: relative;
}

.terminal-role {
  font-size: 11px;
  font-weight: 400;
  color: var(--muted);
  padding: 16px 20px 0;
  letter-spacing: 0.04em;
  opacity: 0.7;
  flex-shrink: 0;
}

.terminal-output {
  flex: 1;
  padding: 12px 20px 20px;
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--text);
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
  opacity: 0.85;
}

.terminal-output .prompt {
  color: var(--muted);
}

.terminal-output .cmd {
  color: var(--text);
}

.terminal-output .out {
  color: #9e9ea8;
}

.terminal-output .accent {
  color: var(--accent);
}

.terminal-output .green {
  color: var(--running);
}

.terminal-output .yellow {
  color: var(--needs-input);
}

.terminal-output .red {
  color: var(--error);
}

.terminal-output .dim {
  color: #4a4a52;
}

.cursor-blink {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--accent);
  opacity: 0.7;
  animation: blink 1.1s step-end infinite;
  vertical-align: text-bottom;
  margin-left: 2px;
}

@keyframes blink {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 0; }
}

/* ─── Attention rail ─── */

.rail {
  width: 200px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  padding: 8px 0;
  gap: 0;
}

.rail-agent {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.2s, opacity 0.2s;
  user-select: none;
}

.rail-agent:hover {
  background: rgba(255, 255, 255, 0.02);
}

.rail-agent.active .rail-name {
  color: var(--accent);
  font-weight: 400;
}

.rail-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.rail-dot.running { background: var(--running); }
.rail-dot.needs-input { background: var(--needs-input); }
.rail-dot.queued { background: var(--queued); }
.rail-dot.idle { background: var(--idle); }
.rail-dot.error { background: var(--error); }

.rail-name {
  font-size: 13px;
  font-weight: 300;
  color: var(--muted);
  transition: color 0.2s;
  flex-shrink: 0;
}

.rail-status {
  font-size: 11px;
  color: #4a4a52;
  font-weight: 300;
  margin-left: auto;
  white-space: nowrap;
}

/* ─── Feed ─── */

.feed {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 0 4px;
}

.feed-item {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding: 6px 0;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.feed-item:hover {
  opacity: 1;
}

.feed-agent {
  font-size: 12px;
  font-weight: 400;
  color: var(--muted);
  min-width: 64px;
  flex-shrink: 0;
}

.feed-text {
  font-size: 12px;
  font-weight: 300;
  color: #9e9ea8;
  flex: 1;
}

.feed-time {
  font-size: 11px;
  color: #4a4a52;
  font-weight: 300;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ─── Mission control ─── */

.mission {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--gap);
  flex: 1;
  align-content: start;
  overflow-y: auto;
  padding: 4px;
}

.mission-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: transform 0.2s ease, background 0.2s;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.mission-card:hover {
  transform: translateY(-2px);
  background: var(--card);
}

.mission-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
}

.mission-card-name {
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
}

.mission-card-branch {
  font-size: 11px;
  color: #4a4a52;
  font-weight: 300;
  margin-left: auto;
}

.mission-card-summary {
  font-size: 12px;
  font-weight: 300;
  color: var(--muted);
  line-height: 1.55;
}

/* ─── Views / transitions ─── */

.view {
  display: none;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  gap: var(--gap);
  animation: fadeIn 0.2s ease;
}

.view.active {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.main-focus {
  flex: 1;
  display: flex;
  gap: var(--gap);
  min-height: 0;
}

.main-compare {
  flex: 1;
  display: flex;
  gap: var(--gap);
  min-height: 0;
}

/* ─── Heartbeat pulse ─── */

.heartbeat {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  opacity: 0.3;
  transition: opacity 0.2s;
}

.heartbeat:hover {
  opacity: 0.6;
}

.heartbeat-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--running);
  animation: pulse 7s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  15% { opacity: 1; transform: scale(1.4); }
  30% { opacity: 0.3; transform: scale(1); }
}

.heartbeat-label {
  font-size: 10px;
  color: var(--muted);
  font-weight: 300;
}

/* ─── Workspace meta ─── */

.workspace-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 4px;
  flex-shrink: 0;
}

.meta-item {
  font-size: 11px;
  color: #4a4a52;
  font-weight: 300;
}

.meta-item span {
  color: var(--muted);
}
</style>
</head>
<body>

<div class="app" id="app">

  <!-- Mission view -->
  <div class="view" id="viewMission">
    <div class="mission" id="missionGrid"></div>
    <div class="feed" id="missionFeed"></div>
  </div>

  <div class="heartbeat">
    <div class="heartbeat-dot"></div>
    <span class="heartbeat-label">sync</span>

</div>

// ─── State ───

let currentWorkspace = 0;
let currentMode = 0; // 0=focus, 1=compare, 2=mission
let currentAgent = 0;
let compareSecondary = 1;

const modeNames = ["Focus", "Compare", "Mission"];

// ─── Rendering ───

function getStatusWord(status) {
  const map = { "running": "run", "needs-input": "input", "queued": "queue", "idle": "idle", "error": "error" };
  return map[status] || status;
}

function getTerminalOutput(workspaceId, role) {
  const key = workspaceId + ":" + role;
  return terminalOutputs[key] || `<span class="prompt">${role} $</span> <span class="dim">No output yet</span>`;
}

function renderWorkspaceTabs() {
  const el = document.getElementById("workspaces");
  el.innerHTML = workspaces.map((ws, i) =>
    `<span class="workspace-link${i === currentWorkspace ? ' active' : ''}" data-ws="${i}">${ws.name}</span>`
  ).join("");

  el.querySelectorAll(".workspace-link").forEach(link => {
    link.addEventListener("click", () => {
      currentWorkspace = parseInt(link.dataset.ws);
      currentAgent = 0;
      compareSecondary = Math.min(1, ws().agents.length - 1);
      render();
    });
  });
}

function renderMeta() {
  const w = ws();
  document.getElementById("workspaceMeta").innerHTML =
    `<span class="meta-item"><span>${w.repo}</span></span>` +
    `<span class="meta-item">${w.template}</span>` +
    `<span class="meta-item">${w.spike}</span>`;
}

function renderModeDots() {
  document.querySelectorAll(".mode-dot").forEach((dot, i) => {
    dot.classList.toggle("active", i === currentMode);
  });
  document.getElementById("modeLabel").textContent = modeNames[currentMode];
}

function renderViews() {
  document.getElementById("viewFocus").classList.toggle("active", currentMode === 0);
  document.getElementById("viewCompare").classList.toggle("active", currentMode === 1);
  document.getElementById("viewMission").classList.toggle("active", currentMode === 2);
}

function renderRail(containerId) {
  const w = ws();
  const el = document.getElementById(containerId);
  el.innerHTML = w.agents.map((agent, i) =>
    `<div class="rail-agent${i === currentAgent ? ' active' : ''}" data-agent="${i}">` +
      `<div class="rail-dot ${agent.status}"></div>` +
      `<span class="rail-name">${agent.role}</span>` +
      `<span class="rail-status">${getStatusWord(agent.status)}</span>` +
    `</div>`
  ).join("");

  el.querySelectorAll(".rail-agent").forEach(item => {
    item.addEventListener("click", () => {
      currentAgent = parseInt(item.dataset.agent);
      render();
    });
  });
}

function renderFocusTerminal() {
  const w = ws();
  const agent = w.agents[currentAgent];
  document.getElementById("focusRole").textContent = agent.role + "  ·  " + agent.branch;
  document.getElementById("focusOutput").innerHTML = getTerminalOutput(w.id, agent.role);
}

function renderCompare() {
  const w = ws();
  const left = w.agents[currentAgent];
  const sec = compareSecondary >= w.agents.length ? 0 : compareSecondary;
  const right = w.agents[sec];

  document.getElementById("compareLeftRole").textContent = left.role + "  ·  " + left.branch;
  document.getElementById("compareLeftOutput").innerHTML = getTerminalOutput(w.id, left.role);
  document.getElementById("compareRightRole").textContent = right.role + "  ·  " + right.branch;
  document.getElementById("compareRightOutput").innerHTML = getTerminalOutput(w.id, right.role);
}

function renderMission() {
  const w = ws();
  const grid = document.getElementById("missionGrid");
  grid.innerHTML = w.agents.map((agent, i) =>
    `<div class="mission-card" data-agent="${i}">` +
      `<div class="mission-card-top">` +
        `<div class="rail-dot ${agent.status}"></div>` +
        `<span class="mission-card-name">${agent.role}</span>` +
        `<span class="mission-card-branch">${agent.branch}</span>` +
      `</div>` +
      `<div class="mission-card-summary">${agent.summary}</div>` +
    `</div>`
  ).join("");

  grid.querySelectorAll(".mission-card").forEach(card => {
    card.addEventListener("click", () => {
      currentAgent = parseInt(card.dataset.agent);
      currentMode = 0;
      render();
    });
  });
}

function renderFeed(containerId) {
  const w = ws();
  const items = w.feed.slice(0, 4);
  const el = document.getElementById(containerId);
  el.innerHTML = items.map(item =>
    `<div class="feed-item">` +
      `<span class="feed-agent">${item.agent}</span>` +
      `<span class="feed-text">${item.text}</span>` +
      `<span class="feed-time">${item.time}</span>` +
    `</div>`
  ).join("");
}

function ws() {
  return workspaces[currentWorkspace];
}

function render() {
  renderWorkspaceTabs();
  renderMeta();
  renderModeDots();
  renderViews();

  if (currentMode === 0) {
    renderRail("focusRail");
    renderFocusTerminal();
    renderFeed("focusFeed");
  } else if (currentMode === 1) {
    renderCompare();
    renderFeed("compareFeed");
  } else {
    renderMission();
    renderFeed("missionFeed");
  }
}

// ─── Events ───

document.querySelectorAll(".mode-dot").forEach(dot => {
  dot.addEventListener("click", () => {
    currentMode = parseInt(dot.dataset.mode);
    render();
  });
});

document.addEventListener("keydown", (e) => {
  if (e.key === "1") { currentMode = 0; render(); }
  if (e.key === "2") { currentMode = 1; render(); }
  if (e.key === "3") { currentMode = 2; render(); }

  // Arrow keys to navigate agents in focus mode
  if (currentMode === 0) {
    const agents = ws().agents;
    if (e.key === "ArrowDown" || e.key === "j") {
      e.preventDefault();
      currentAgent = (currentAgent + 1) % agents.length;
      render();
    }
    if (e.key === "ArrowUp" || e.key === "k") {
      e.preventDefault();
      currentAgent = (currentAgent - 1 + agents.length) % agents.length;
      render();
    }
  }

  // In compare mode, Tab switches secondary
  if (currentMode === 1 && e.key === "Tab") {
    e.preventDefault();
    const agents = ws().agents;
    compareSecondary = (compareSecondary + 1) % agents.length;
    if (compareSecondary === currentAgent) {
      compareSecondary = (compareSecondary + 1) % agents.length;
    }
    render();
  }
});

// ─── Heartbeat: subtle output append every 7s ───

setInterval(() => {
  const w = ws();
  const running = w.agents.filter(a => a.status === "running");
  if (running.length === 0) return;

  // Find a visible terminal and nudge its scroll
  const outputs = document.querySelectorAll(".terminal-output");
  outputs.forEach(el => {
    if (el.scrollHeight > el.clientHeight) {
      el.scrollTop = el.scrollHeight;
    }
  });
}, 7000);

// ─── Init ───

render();
</script>
