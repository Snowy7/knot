<html lang="en">
<head>
<meta charset="UTF-8">

<title>knot</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1b26;
  --fg: #a9b1d6;
  --bright: #c0caf5;
  --muted: #565f89;
  --comment: #545c7e;
  --running: #9ece6a;
  --input: #e0af68;
  --queued: #565f89;
  --idle: #545c7e;
  --error: #f7768e;
  --border: #33394d;
  --selection: rgba(86, 95, 137, 0.25);
}

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: "Berkeley Mono", "SF Mono", "JetBrains Mono", "Cascadia Code", monospace;
  font-size: 13px;
  line-height: 1.55;
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 12px 16px;
  max-width: 960px;
  margin: 0 auto;
  overflow: hidden;
}

.header-line {
  display: flex;
  justify-content: space-between;
  color: var(--bright);
  white-space: nowrap;
  flex-shrink: 0;
}

.heavy-rule {
  color: var(--muted);
  overflow: hidden;
  white-space: nowrap;
  flex-shrink: 0;
  margin: 2px 0;
  user-select: none;
}

.info-line {
  color: var(--fg);
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.info-line .label { color: var(--muted); }
.info-line .value { color: var(--bright); }

.shortcuts { flex-shrink: 0; margin-top: 1px; color: var(--muted); white-space: nowrap; }
.shortcuts .key { color: var(--input); }

.workspace-tabs { flex-shrink: 0; margin-top: 2px; color: var(--muted); white-space: nowrap; }
.workspace-tabs .active-tab { color: var(--bright); }
.workspace-tabs .tab-key { color: var(--input); }

.section {
  flex-shrink: 0;
  margin-top: 4px;
}

.section-border { color: var(--border); user-select: none; }
.section-label { color: var(--muted); }

.agent-row {
  display: flex;
  white-space: nowrap;
  overflow: hidden;
  padding: 0 0 0 0;
  cursor: pointer;
}

.agent-row:hover { background: var(--selection); }
.agent-row.selected { background: var(--selection); }
.agent-row .pipe { color: var(--border); user-select: none; min-width: 2ch; }

.agent-row .status-icon { min-width: 2ch; text-align: center; }
.agent-row .status-text { min-width: 8ch; }
.agent-row .role { color: var(--bright); min-width: 12ch; }
.agent-row .branch { color: var(--muted); min-width: 28ch; }
.agent-row .summary { color: var(--comment); overflow: hidden; text-overflow: ellipsis; }

.status-running .status-icon, .status-running .status-text { color: var(--running); }
.status-needs-input .status-icon, .status-needs-input .status-text { color: var(--input); }
.status-queued .status-icon, .status-queued .status-text { color: var(--queued); }
.status-idle .status-icon, .status-idle .status-text { color: var(--idle); }
.status-error .status-icon, .status-error .status-text { color: var(--error); }

.agent-header-row {
  display: flex;
  white-space: nowrap;
  color: var(--comment);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.agent-header-row .pipe { color: var(--border); user-select: none; min-width: 2ch; }
.agent-header-row span:not(.pipe) { display: inline-block; }

.terminal-area {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  margin-top: 4px;
  display: flex;
  flex-direction: column;
}

.terminal-content {
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.terminal-content::-webkit-scrollbar { width: 4px; }
.terminal-content::-webkit-scrollbar-track { background: transparent; }
.terminal-content::-webkit-scrollbar-thumb { background: var(--border); }

.terminal-line { white-space: pre-wrap; word-break: break-all; }
.terminal-line .prompt-char { color: var(--running); }
.terminal-line .path { color: var(--bright); }
.terminal-line .context-tag { color: var(--input); }
.terminal-line .status-tag { color: var(--input); }
.terminal-line .ts { color: var(--muted); min-width: 6ch; display: inline-block; }
.terminal-line .ok { color: var(--running); }
.terminal-line .warn { color: var(--input); }
.terminal-line .err { color: var(--error); }

.compare-container {
  flex: 1;
  min-height: 0;
  display: flex;
  gap: 0;
  margin-top: 4px;
  overflow: hidden;
}

.compare-pane {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.compare-pane .terminal-content { flex: 1; overflow-y: auto; }

.compare-divider {
  width: 1px;
  background: var(--border);
  flex-shrink: 0;
  margin: 0 4px;
}

.mission-table {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  margin-top: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.mission-row {
  display: flex;
  white-space: nowrap;
  overflow: hidden;
  padding: 1px 0;
}

.mission-row .pipe { color: var(--border); user-select: none; min-width: 2ch; }
.mission-row .role { color: var(--bright); min-width: 12ch; }
.mission-row .status-text { min-width: 8ch; }
.mission-row .last-line { color: var(--comment); overflow: hidden; text-overflow: ellipsis; }

.feed-section {
  flex-shrink: 0;
  margin-top: 4px;
  max-height: 7.5em;
  overflow: hidden;
}

.feed-row {
  display: flex;
  white-space: nowrap;
  overflow: hidden;
}

.feed-row .pipe { color: var(--border); user-select: none; min-width: 2ch; }
.feed-row .time { color: var(--muted); min-width: 7ch; }
.feed-row .agent { color: var(--bright); min-width: 12ch; }
.feed-row .text { color: var(--fg); overflow: hidden; text-overflow: ellipsis; }

.prompt-line {
  flex-shrink: 0;
  margin-top: 4px;
  display: flex;
  align-items: center;
  white-space: nowrap;
  color: var(--fg);
}

.prompt-line .prompt-gt { color: var(--running); margin-right: 1ch; }

.prompt-input {
  background: none;
  border: none;
  outline: none;
  color: var(--bright);
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  flex: 1;
  caret-color: var(--bright);
}

.prompt-input::placeholder { color: var(--comment); }

.cursor-blink {
  display: inline-block;
  width: 7.8px;
  height: 15px;
  background: var(--bright);
  animation: blink 1s step-end infinite;
  vertical-align: middle;
  margin-left: -1px;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

.help-bar {
  flex-shrink: 0;
  display: flex;
  gap: 2ch;
  color: var(--comment);
  white-space: nowrap;
  margin-top: 2px;
  font-size: 12px;
  flex-wrap: wrap;
}
.help-bar .key { color: var(--muted); }

.command-overlay {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #16161e;
  border-top: 1px solid var(--border);
  padding: 8px 16px;
  display: none;
  z-index: 100;
}

.command-overlay.open { display: flex; align-items: center; }
.command-overlay .prefix { color: var(--input); margin-right: 1ch; }

.command-input {
  background: none;
  border: none;
  outline: none;
  color: var(--bright);
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
  flex: 1;
  caret-color: var(--bright);
}

.hidden { display: none !important; }
</style>
</head>

function statusIcon(s) {
  switch (s) {
    case "needs-input": return "\u25cf";
    case "running": return "\u25b6";
    case "queued": return "\u25cb";
    case "idle": return "\u00b7";
    case "error": return "\u2715";
    default: return " ";
  }
}

function statusLabel(s) {
  switch (s) {
    case "needs-input": return "input";
    case "running": return "run";
    case "queued": return "queue";
    case "idle": return "idle";
    case "error": return "error";
    default: return s;
  }
}

function pad(str, len) {
  str = String(str);
  return str.length >= len ? str.substring(0, len) : str + " ".repeat(len - str.length);
}

function clock() {
  const d = new Date();
  return [d.getHours(), d.getMinutes(), d.getSeconds()].map(n => String(n).padStart(2, "0")).join(":");
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function ws() { return workspaces[state.currentWorkspace]; }
function agents() { return ws().agents; }
function selectedAgent() { return agents()[state.selectedAgent]; }

function renderTerminalLine(line) {
  if (line === "") return '<span class="terminal-line">&nbsp;</span>';
  let html = esc(line);
  html = html.replace(/^(\$\s)/, '<span class="prompt-char">$1</span>');
  html = html.replace(/~\/[^\s]+/g, '<span class="path">$&</span>');
  html = html.replace(/\[context\]/g, '<span class="context-tag">[context]</span>');
  html = html.replace(/\[status\]/g, '<span class="status-tag">[status]</span>');
  html = html.replace(/ERROR:/g, '<span class="err">ERROR:</span>');
  html = html.replace(/WARN:/g, '<span class="warn">WARN:</span>');
  html = html.replace(/^(\d{2}:\d{2})\s/, '<span class="ts">$1</span> ');
  html = html.replace(/clean|pass|passing|completed|stable|finished|complete|landed/gi, '<span class="ok">$&</span>');
  html = html.replace(/error|halting|blocked|risky|mismatch|conflict|collides|trap/gi, '<span class="err">$&</span>');
  return '<span class="terminal-line">' + html + '</span>';
}

function renderAgentTerminal(agentRole, wsId) {
  const lines = state.liveOutputs[wsId || ws().id][agentRole] || [];
  return lines.map(renderTerminalLine).join("\n");
}

  let html = '';

  html += '<div class="header-line"><span>knot v0.1.0</span><span>' + clock() + '</span></div>';
  html += '<div class="heavy-rule">\u2501'.repeat(80) + '</div>';

  html += '<div class="info-line">';
  html += '<span class="label">workspace: </span><span class="value">' + esc(w.name.toLowerCase()) + '</span>';
  html += ' <span class="label">(' + esc(w.repo) + ')</span>';
  html += '&nbsp;&nbsp;&nbsp;&nbsp;';
  const modes = [["f", "ocus", "focus"], ["c", "ompare", "compare"], ["m", "ission", "mission"]];
  for (const [key, rest, mode] of modes) {
    const active = state.viewMode === mode;
    html += '<span style="color:' + (active ? "var(--bright)" : "var(--muted)") + '">[<span class="key" style="color:var(--input)">' + key + '</span>]' + rest + '</span> ';
  }
  html += '</div>';

  html += '<div class="info-line"><span class="label">template: </span>' + esc(w.template) + '<span class="label"> | agents: </span>' + ag.length + '<span class="label"> | spike: </span>' + esc(w.spike) + '</div>';

  html += '<div class="workspace-tabs">workspaces: ';
  workspaces.forEach((ws2, i) => {
    const active = i === state.currentWorkspace;
    html += '<span class="' + (active ? "active-tab" : "") + '">[<span class="tab-key">' + (i + 1) + '</span>]' + esc(ws2.id) + '</span> ';
  });
  html += '</div>';

  // Agent table
  html += '<div class="section">';
  html += '<div class="section-border">\u250c agents \u2500'.repeat(10) + '</div>';

  html += '<div class="agent-header-row"><span class="pipe">\u2502 </span>';
  html += '<span style="min-width:2ch"></span><span style="min-width:8ch;display:inline-block">STATUS</span>';
  html += '<span style="min-width:12ch;display:inline-block">ROLE</span>';
  html += '<span style="min-width:28ch;display:inline-block">BRANCH</span>';
  html += '<span>SUMMARY</span></div>';

  ag.forEach((a, i) => {
    const selected = i === sel;
    html += '<div class="agent-row status-' + a.status + (selected ? ' selected' : '') + '" data-agent="' + i + '">';
    html += '<span class="pipe">\u2502 </span>';
    html += '<span class="status-icon">' + statusIcon(a.status) + '</span>';
    html += '<span class="status-text">' + pad(statusLabel(a.status), 8) + '</span>';
    html += '<span class="role">' + pad(a.role, 12) + '</span>';
    html += '<span class="branch">' + pad(a.branch, 28) + '</span>';
    html += '<span class="summary">' + esc(a.summary.substring(0, 50)) + '</span>';
    html += '</div>';
  });

  html += '<div class="section-border">\u2514' + '\u2500'.repeat(70) + '</div>';
  html += '</div>';

  // Main content area based on view mode
  if (state.viewMode === "focus") {
    html += '<div class="terminal-area">';
    html += '<div class="section-border">\u250c ' + esc(curAgent.role) + ' \u2500\u2500 ' + esc(curAgent.branch) + ' \u2500\u2500 ' + esc(curAgent.status) + ' ' + '\u2500'.repeat(20) + '</div>';
    html += '<div class="terminal-content" id="terminalContent">';
    html += renderAgentTerminal(curAgent.role);
    html += '</div>';
    html += '<div class="section-border">\u2514' + '\u2500'.repeat(70) + '</div>';
    html += '</div>';
  } else if (state.viewMode === "compare") {
    const compAgent = ag[state.compareAgent] || ag[1] || ag[0];
    html += '<div class="compare-container">';

    html += '<div class="compare-pane">';
    html += '<div class="section-border">\u250c ' + esc(curAgent.role) + ' \u2500\u2500 ' + esc(curAgent.status) + ' ' + '\u2500'.repeat(10) + '</div>';
    html += '<div class="terminal-content">' + renderAgentTerminal(curAgent.role) + '</div>';
    html += '<div class="section-border">\u2514' + '\u2500'.repeat(35) + '</div>';
    html += '</div>';

    html += '<div class="compare-divider"></div>';

    html += '<div class="compare-pane">';
    html += '<div class="section-border">\u250c ' + esc(compAgent.role) + ' \u2500\u2500 ' + esc(compAgent.status) + ' ' + '\u2500'.repeat(10) + '</div>';
    html += '<div class="terminal-content">' + renderAgentTerminal(compAgent.role) + '</div>';
    html += '<div class="section-border">\u2514' + '\u2500'.repeat(35) + '</div>';
    html += '</div>';

    html += '</div>';
  } else if (state.viewMode === "mission") {
    html += '<div class="mission-table">';
    html += '<div class="section-border">\u250c mission \u2500'.repeat(10) + '</div>';

    html += '<div class="agent-header-row"><span class="pipe">\u2502 </span>';
    html += '<span style="min-width:12ch;display:inline-block">ROLE</span>';
    html += '<span style="min-width:8ch;display:inline-block">STATUS</span>';
    html += '<span>LAST OUTPUT</span></div>';

    ag.forEach((a) => {
      const lines = state.liveOutputs[w.id][a.role] || [];
      const lastLine = lines.filter(l => l.trim() !== "").slice(-1)[0] || "(no output)";
      html += '<div class="mission-row status-' + a.status + '">';
      html += '<span class="pipe">\u2502 </span>';
      html += '<span class="role">' + pad(a.role, 12) + '</span>';
      html += '<span class="status-text">' + statusIcon(a.status) + ' ' + pad(statusLabel(a.status), 6) + '</span>';
      html += '<span class="last-line">' + esc(lastLine.substring(0, 60)) + '</span>';
      html += '</div>';
    });

    html += '<div class="section-border">\u2514' + '\u2500'.repeat(70) + '</div>';
    html += '</div>';
  }

  // Feed
  html += '<div class="feed-section">';
  html += '<div class="section-border">\u250c feed ' + '\u2500'.repeat(64) + '</div>';
  (w.feed || []).forEach(f => {
    html += '<div class="feed-row"><span class="pipe">\u2502 </span>';
    html += '<span class="time">' + esc(f.time) + '</span>';
    html += '<span class="agent">' + esc(f.agent) + '</span>';
    html += '<span class="text">' + esc(f.text) + '</span>';
    html += '</div>';
  });
  html += '<div class="section-border">\u2514' + '\u2500'.repeat(70) + '</div>';
  html += '</div>';

  // Prompt
  html += '<div class="prompt-line"><span class="prompt-gt">&gt;</span><input type="text" class="prompt-input" id="promptInput" spellcheck="false" autocomplete="off" placeholder="" /><span class="cursor-blink" id="cursorBlink"></span></div>';

  // Help bar
  html += '<div class="help-bar">';
  html += '<span><span class="key">[j/k]</span> navigate</span>';
  html += '<span><span class="key">[enter]</span> focus</span>';
  html += '<span><span class="key">[tab]</span> cycle</span>';
  html += '<span><span class="key">[f]</span> focus</span>';
  html += '<span><span class="key">[c]</span> compare</span>';
  html += '<span><span class="key">[m]</span> mission</span>';
  html += '<span><span class="key">[1-3]</span> workspace</span>';
  html += '<span><span class="key">[:]</span> command</span>';
  html += '<span><span class="key">[?]</span> help</span>';
  html += '</div>';

  document.getElementById("app").innerHTML = html;

  // Scroll terminal to bottom
  const tc = document.getElementById("terminalContent");
  if (tc) tc.scrollTop = tc.scrollHeight;

  // Click handlers for agent rows
  document.querySelectorAll(".agent-row[data-agent]").forEach(row => {
    row.addEventListener("click", () => {
      state.selectedAgent = parseInt(row.dataset.agent);
      state.viewMode = "focus";
      render();
    });
  });

  // Prompt input focus management
  const pi = document.getElementById("promptInput");
  if (pi) {
    pi.addEventListener("focus", () => {
      const cb = document.getElementById("cursorBlink");
      if (cb) cb.style.display = "none";
    });
    pi.addEventListener("blur", () => {
      const cb = document.getElementById("cursorBlink");
      if (cb) cb.style.display = "";
    });
  }
}

function openCommand(prefix) {
  state.commandOpen = true;
  state.commandPrefix = prefix;
  const overlay = document.getElementById("commandOverlay");
  const input = document.getElementById("commandInput");
  const prefixEl = document.getElementById("commandPrefix");
  overlay.classList.add("open");
  prefixEl.textContent = prefix;
  input.value = "";
  input.focus();
}

function closeCommand() {
  state.commandOpen = false;
  const overlay = document.getElementById("commandOverlay");
  overlay.classList.remove("open");
  document.getElementById("commandInput").blur();
}

function executeCommand(cmd) {
  cmd = cmd.trim().toLowerCase();
  // workspace switch
  for (let i = 0; i < workspaces.length; i++) {
    if (cmd === workspaces[i].id || cmd === workspaces[i].name.toLowerCase()) {
      state.currentWorkspace = i;
      state.selectedAgent = 0;
      render();
      return;
    }
  }
  // agent focus
  const ag = agents();
  for (let i = 0; i < ag.length; i++) {
    if (cmd === ag[i].role) {
      state.selectedAgent = i;
      state.viewMode = "focus";
      render();
      return;
    }
  }
  // mode
  if (cmd === "focus" || cmd === "f") { state.viewMode = "focus"; render(); return; }
  if (cmd === "compare" || cmd === "c") { state.viewMode = "compare"; render(); return; }
  if (cmd === "mission" || cmd === "m") { state.viewMode = "mission"; render(); return; }
}

document.getElementById("commandInput").addEventListener("keydown", (e) => {
  if (e.key === "Escape") { closeCommand(); e.preventDefault(); }
  if (e.key === "Enter") {
    executeCommand(e.target.value);
    closeCommand();
    e.preventDefault();
  }
});

document.addEventListener("keydown", (e) => {
  if (state.commandOpen) return;

  const pi = document.getElementById("promptInput");
  if (pi && document.activeElement === pi) {
    if (e.key === "Escape") { pi.blur(); e.preventDefault(); }
    return;
  }

  const ag = agents();

  switch (e.key) {
    case "j":
      state.selectedAgent = Math.min(state.selectedAgent + 1, ag.length - 1);
      render();
      e.preventDefault();
      break;
    case "k":
      state.selectedAgent = Math.max(state.selectedAgent - 1, 0);
      render();
      e.preventDefault();
      break;
    case "Tab":
      state.selectedAgent = (state.selectedAgent + 1) % ag.length;
      render();
      e.preventDefault();
      break;
    case "Enter":
      state.viewMode = "focus";
      render();
      e.preventDefault();
      break;
    case "f":
      state.viewMode = "focus";
      render();
      e.preventDefault();
      break;
    case "c":
      state.viewMode = "compare";
      if (state.selectedAgent === state.compareAgent) {
        state.compareAgent = (state.selectedAgent + 1) % ag.length;
      }
      render();
      e.preventDefault();
      break;
    case "m":
      state.viewMode = "mission";
      render();
      e.preventDefault();
      break;
    case "1":
    case "2":
    case "3":
      const idx = parseInt(e.key) - 1;
      if (idx < workspaces.length) {
        state.currentWorkspace = idx;
        state.selectedAgent = 0;
        render();
      }
      e.preventDefault();
      break;
    case ":":
    case "/":
      openCommand(e.key);
      e.preventDefault();
      break;
    case "?":
      e.preventDefault();
      break;
  }
});

// Heartbeat: add output lines every 7 seconds
setInterval(() => {
  const w = ws();
  for (const agent of w.agents) {
    const hb = heartbeatLines[w.id]?.[agent.role];
    if (!hb || hb.length === 0) continue;
    const counter = state.heartbeatCounters[w.id][agent.role];
    if (counter < hb.length) {
      state.liveOutputs[w.id][agent.role].push(hb[counter]);
      state.heartbeatCounters[w.id][agent.role]++;
    }
  }
  render();
}, 7000);

// Clock update every second
setInterval(() => {
  const headerLine = document.querySelector(".header-line span:last-child");
  if (headerLine) headerLine.textContent = clock();
}, 1000);

// Compare mode: j/k also shifts compare agent when holding shift
document.addEventListener("keydown", (e) => {
  if (state.commandOpen) return;
  if (document.activeElement && document.activeElement.tagName === "INPUT") return;

  if (state.viewMode === "compare" && e.shiftKey) {
    const ag = agents();
    if (e.key === "J") {
      state.compareAgent = Math.min(state.compareAgent + 1, ag.length - 1);
      if (state.compareAgent === state.selectedAgent) {
        state.compareAgent = Math.min(state.compareAgent + 1, ag.length - 1);
      }
      render();
      e.preventDefault();
    } else if (e.key === "K") {
      state.compareAgent = Math.max(state.compareAgent - 1, 0);
      if (state.compareAgent === state.selectedAgent) {
        state.compareAgent = Math.max(state.compareAgent - 1, 0);
      }
      render();
      e.preventDefault();
    }
  }
});

// Initial render
render();
</script>
</body>
</html>
